name: Deploy Flet App to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-flet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'tymate-app'          # ← change to whatever you name the new App Service
          slot-name: 'production'
          publish-profile: ${{ secrets.AZURE_FLET_PUBLISH_PROFILE }}
          package: .                      # deploy entire repo root (where main.py lives)
